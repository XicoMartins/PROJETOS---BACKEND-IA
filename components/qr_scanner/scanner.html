<section class="qr-scanner" data-qr-scanner-root>
  <div class="qr-scanner__viewport" data-viewport hidden>
    <video autoplay muted playsinline></video>
    <div class="qr-scanner__guide" aria-hidden="true"></div>
  </div>
  <p class="qr-scanner__status" data-status role="status" aria-live="polite"></p>
  <div class="qr-scanner__actions">
    <button type="button" class="qr-scanner__primary" data-start>Iniciar câmera</button>
    <button type="button" class="qr-scanner__danger" data-stop hidden>Parar câmera</button>
    <button type="button" class="qr-scanner__secondary" data-switch hidden>Trocar câmera</button>
  </div>
</section>
